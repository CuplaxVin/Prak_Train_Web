<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Flebox Modeling</title>
    <style>
      body {
        background-color: blueviolet;
        font-family: Arial, Helvetica, sans-serif;
      }

      h1 {
        text-align: center;
        color: rgb(0, 0, 0);
        background-color: silver;
        border: 5px solid black;
        margin: 50px auto;
        width: 270px;
        height: 40px;
      }

      /* permainan flebox pertama */
      .container {
        width: 850px;
        height: 350px;

        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 30px;

        margin: 50px auto;
        background-color: black;
      }

      .box {
        border: 10px solid blue;
        padding: 50px;
        background-color: aqua;
      }

      /* permainan flexbox kedua */
      .container-2 {
        width: 60px;
        height: 800px;

        display: flex;
        justify-content: space-evenly;
        align-items: center;
        gap: 30px;
        flex-direction: column-reverse;

        margin: 50px auto;
        background-color: black;
      }

      .box-2 {
        padding: 12px;
        border: 10px solid rgb(43, 226, 156);
        background-color: brown;
      }

      /* permainan flexbox ketiga */
      .container-3 {
        width: 300px;
        height: 150px;

        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        flex-direction: row-reverse;

        margin: 50px auto;
        background-color: blue;
      }

      .box-3 {
        background-color: burlywood;
        padding: 12px;
        border: 10px solid black;
      }
    </style>
  </head>
  <body>
    <h1>Sample Flebox</h1>

    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <div class="container-2">
      <div class="box-2">1</div>
      <div class="box-2">2</div>
      <div class="box-2">3</div>
    </div>

    <div class="container-3">
      <div class="box-3">1</div>
      <div class="box-3">2</div>
      <div class="box-3">3</div>
    </div>
  </body>
</html>
